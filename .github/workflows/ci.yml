name: CI

on:
  push:
    branches: [main, go-core]
    tags: ["v*"]
  pull_request:
    branches: [main, go-core]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: .
          # Gate on real bugs only for maintained shell entrypoints.
          severity: error

  go-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
      - name: Check Go formatting
        working-directory: go
        run: test -z "$(gofmt -l .)"
      - name: Run Go package tests with race detector
        working-directory: go
        run: go test -race ./...
      - name: Vet Go packages
        working-directory: go
        run: go vet ./...
      - name: Vet Windows code paths
        working-directory: go
        env:
          GOOS: windows
          GOARCH: amd64
        run: go vet ./...

  go-cross-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
      - name: Cross-build Go llm-server
        working-directory: go
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -o /tmp/llm-server-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/llm-server

  parser-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run parse_gguf regression tests
        run: python3 tests/test_parse_gguf.py

  estimator-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
      - name: Run estimator regression tests
        run: bash tests/test_estimator.sh

  safety-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
      - name: Run safety regression tests
        run: bash tests/test_safety.sh

  setup-home-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
      - name: Run setup home regression tests
        run: bash tests/test_setup_home.sh

  model-index-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run model index regression tests
        run: bash tests/test_model_index.sh

  moe-placement-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
      - name: Run MoE placement regression tests
        run: bash tests/test_moe_placement.sh

  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python test dependencies
        run: python3 -m pip install pytest huggingface_hub
      - name: Run downloader and recommendation pytest suites
        run: python3 -m pytest tests/test_downloader_quant.py tests/test_update_recommendations.py

  installer-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
      - name: Install Go command to a temporary prefix
        run: |
          tmp="$(mktemp -d)"
          LLM_INSTALL_MODE=build \
            LLM_INSTALL_BACKEND=skip \
            LLM_INSTALL_PREFIX="$tmp/bin" \
            LLM_INSTALL_PY_DEPS=skip \
            LLM_INSTALL_NONINTERACTIVE=1 \
            ./install.sh
          test -x "$tmp/bin/llm-server"
          test -x "$tmp/bin/llm-server-bash"
          test -x "$tmp/bin/download_any_gguf.py"
          test -x "$tmp/bin/model_index.py"
          "$tmp/bin/llm-server" version | grep -q 'llm-server'

  package-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build release archive layout with a fake backend
        run: |
          tmp="$(mktemp -d)"
          printf '#!/usr/bin/env sh\necho fake llama-server\n' > "$tmp/llama-server"
          chmod +x "$tmp/llama-server"
          printf '#!/usr/bin/env sh\necho fake llm-server-go\n' > go/llm-server
          chmod +x go/llm-server
          scripts/package-release.sh llm-server-linux-x86_64-cpu.tar.gz "$tmp/llama-server" "$tmp/dist"
          tar -tzf "$tmp/dist/llm-server-linux-x86_64-cpu.tar.gz" | grep -q '/bin/llama-server$'
          tar -tzf "$tmp/dist/llm-server-linux-x86_64-cpu.tar.gz" | grep -q '/bin/llm-server$'
          tar -tzf "$tmp/dist/llm-server-linux-x86_64-cpu.tar.gz" | grep -q '/llm-server-bash$'
          tar -tzf "$tmp/dist/llm-server-linux-x86_64-cpu.tar.gz" | grep -q '/bin/model_index.py$'
          tar -tzf "$tmp/dist/llm-server-linux-x86_64-cpu.tar.gz" | grep -q '/bin/download_any_gguf.py$'
          tar -tzf "$tmp/dist/llm-server-linux-x86_64-cpu.tar.gz" | grep -q '/setup.sh$'

  package-windows-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
      - name: Build Windows package and install from local release dir
        shell: pwsh
        run: |
          go build -C go -trimpath -o llm-server.exe ./cmd/llm-server
          $tmp = Join-Path $env:RUNNER_TEMP ([guid]::NewGuid().ToString('N'))
          $release = Join-Path $tmp 'release'
          $app = Join-Path $tmp 'app'
          New-Item -ItemType Directory -Force -Path $release | Out-Null
          Copy-Item go/llm-server.exe (Join-Path $tmp 'llama-server.exe')
          scripts/package-release.ps1 -AssetName llm-server-windows-x86_64-cpu.zip -ServerBin (Join-Path $tmp 'llama-server.exe') -OutDir $release -LlmServerBin go/llm-server.exe
          Expand-Archive -Path (Join-Path $release 'llm-server-windows-x86_64-cpu.zip') -DestinationPath (Join-Path $tmp 'expanded') -Force
          if (!(Test-Path (Join-Path $tmp 'expanded/llm-server-windows-x86_64-cpu/bin/llm-server.exe'))) { throw 'packaged llm-server.exe missing' }
          if (!(Test-Path (Join-Path $tmp 'expanded/llm-server-windows-x86_64-cpu/bin/llama-server.exe'))) { throw 'packaged llama-server.exe missing' }
          ./install.ps1 -InstallDir $app -ReleaseDir $release -NoPath
          & (Join-Path $app '.bin/llm-server.exe') --version
          if (!(Test-Path (Join-Path $app '.bin/llama-server.exe'))) { throw 'installed llama-server.exe missing' }
          if (!(Test-Path (Join-Path $app 'llm-server.cmd'))) { throw 'installed llm-server.cmd missing' }

  release-install-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install from local release bundle outside repo
        run: |
          tmp="$(mktemp -d)"
          printf '#!/usr/bin/env sh\necho fake llama-server\n' > "$tmp/llama-server"
          chmod +x "$tmp/llama-server"
          printf '#!/usr/bin/env sh\necho fake llm-server-go\n' > go/llm-server
          chmod +x go/llm-server
          scripts/package-release.sh llm-server-linux-x86_64-cpu.tar.gz "$tmp/llama-server" "$tmp/release"
          (cd "$tmp/release" && sha256sum llm-server-linux-x86_64-cpu.tar.gz > SHA256SUMS)
          mkdir -p "$tmp/run"
          (
            cd "$tmp/run"
            LLM_INSTALL_MODE=release \
              LLM_INSTALL_BACKEND=cpu \
              LLM_INSTALL_RELEASE_DIR="$tmp/release" \
              LLM_INSTALL_PREFIX="$tmp/prefix" \
              LLM_INSTALL_PY_DEPS=skip \
              LLM_INSTALL_NONINTERACTIVE=1 \
              "$GITHUB_WORKSPACE/install.sh"
          )
          test -x "$tmp/prefix/llm-server"
          test -x "$tmp/prefix/llm-server-bash"
          "$tmp/prefix/llm-server" version | grep -q 'fake llm-server-go'
          test -x "$tmp/prefix/llama-server"
          test -x "$tmp/prefix/download_any_gguf.py"
          test -x "$tmp/prefix/model_index.py"
