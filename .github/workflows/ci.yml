name: CI

on:
  push:
    branches: [main, go-core]
    tags: ["v*"]
  pull_request:
    branches: [main, go-core]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: .
          # Gate on real bugs only for maintained shell entrypoints.
          severity: error

  go-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache: false
      - name: Check Go formatting
        working-directory: go
        run: test -z "$(gofmt -l .)"
      - name: Run Go package tests with race detector
        working-directory: go
        run: go test -race ./...
      - name: Vet Go packages
        working-directory: go
        run: go vet ./...
      - name: Vet Windows code paths
        working-directory: go
        env:
          GOOS: windows
          GOARCH: amd64
        run: go vet ./...

  go-cross-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache: false
      - name: Cross-build Go ggrun
        working-directory: go
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -o /tmp/ggrun-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/ggrun

  parser-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Run parse_gguf regression tests
        run: python3 tests/test_parse_gguf.py

  estimator-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache: false
      - name: Run estimator regression tests
        run: bash tests/test_estimator.sh

  safety-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache: false
      - name: Run safety regression tests
        run: bash tests/test_safety.sh

  setup-home-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache: false
      - name: Run setup home regression tests
        run: bash tests/test_setup_home.sh

  model-index-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Run model index regression tests
        run: bash tests/test_model_index.sh

  moe-placement-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache: false
      - name: Run MoE placement regression tests
        run: bash tests/test_moe_placement.sh

  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install Python test dependencies
        run: python3 -m pip install pytest huggingface_hub
      - name: Run downloader and recommendation pytest suites
        run: python3 -m pytest tests/test_downloader_quant.py tests/test_update_recommendations.py

  installer-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache: false
      - name: Install Go command to a temporary prefix
        run: |
          tmp="$(mktemp -d)"
          LLM_INSTALL_MODE=build \
            LLM_INSTALL_BACKEND=skip \
            LLM_INSTALL_PREFIX="$tmp/bin" \
            LLM_INSTALL_PY_DEPS=skip \
            LLM_INSTALL_NONINTERACTIVE=1 \
            ./install.sh
          test -x "$tmp/bin/ggrun"
          test -x "$tmp/bin/llm-server-bash"
          test -x "$tmp/bin/download_any_gguf.py"
          test -x "$tmp/bin/model_index.py"
          "$tmp/bin/ggrun" version | grep -q 'ggrun'

  package-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build release archive layout with a fake backend
        run: |
          tmp="$(mktemp -d)"
          printf '#!/usr/bin/env sh\necho fake llama-server\n' > "$tmp/llama-server"
          chmod +x "$tmp/llama-server"
          printf '#!/usr/bin/env sh\necho fake llm-server-go\n' > go/ggrun
          chmod +x go/ggrun
          scripts/package-release.sh ggrun-linux-x86_64-cpu.tar.gz "$tmp/llama-server" "$tmp/dist"
          tar -tzf "$tmp/dist/ggrun-linux-x86_64-cpu.tar.gz" | grep -q '/bin/llama-server$'
          tar -tzf "$tmp/dist/ggrun-linux-x86_64-cpu.tar.gz" | grep -q '/bin/ggrun$'
          tar -tzf "$tmp/dist/ggrun-linux-x86_64-cpu.tar.gz" | grep -q '/llm-server-bash$'
          tar -tzf "$tmp/dist/ggrun-linux-x86_64-cpu.tar.gz" | grep -q '/bin/model_index.py$'
          tar -tzf "$tmp/dist/ggrun-linux-x86_64-cpu.tar.gz" | grep -q '/bin/download_any_gguf.py$'
          tar -tzf "$tmp/dist/ggrun-linux-x86_64-cpu.tar.gz" | grep -q '/setup.sh$'

  package-windows-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache: false
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Build Windows package and install from local release dir
        shell: pwsh
        run: |
          go build -C go -trimpath -o ggrun.exe ./cmd/ggrun
          go build -o "$env:RUNNER_TEMP/fake-llama-server.exe" ./tests/fake_llama_server.go
          $tmp = Join-Path $env:RUNNER_TEMP ([guid]::NewGuid().ToString('N'))
          $release = Join-Path $tmp 'release'
          $app = Join-Path $tmp 'app'
          New-Item -ItemType Directory -Force -Path $release | Out-Null
          Copy-Item "$env:RUNNER_TEMP/fake-llama-server.exe" (Join-Path $tmp 'llama-server.exe')
          scripts/package-release.ps1 -AssetName ggrun-windows-x86_64-cpu.zip -ServerBin (Join-Path $tmp 'llama-server.exe') -OutDir $release -LlmServerBin go/ggrun.exe
          $asset = Join-Path $release 'ggrun-windows-x86_64-cpu.zip'
          $hash = (Get-FileHash -Algorithm SHA256 $asset).Hash.ToLowerInvariant()
          "$hash  ggrun-windows-x86_64-cpu.zip" | Set-Content -Path (Join-Path $release 'SHA256SUMS') -Encoding ASCII
          Expand-Archive -Path (Join-Path $release 'ggrun-windows-x86_64-cpu.zip') -DestinationPath (Join-Path $tmp 'expanded') -Force
          if (!(Test-Path (Join-Path $tmp 'expanded/ggrun-windows-x86_64-cpu/bin/ggrun.exe'))) { throw 'packaged ggrun.exe missing' }
          if (!(Test-Path (Join-Path $tmp 'expanded/ggrun-windows-x86_64-cpu/bin/llama-server.exe'))) { throw 'packaged llama-server.exe missing' }
          ./install.ps1 -InstallDir $app -ReleaseDir $release -NoPath
          & (Join-Path $app '.bin/ggrun.exe') --version
          if (!(Test-Path (Join-Path $app '.bin/llama-server.exe'))) { throw 'installed llama-server.exe missing' }
          if (!(Test-Path (Join-Path $app 'ggrun.cmd'))) { throw 'installed ggrun.cmd missing' }
          & python -c 'import huggingface_hub, tqdm'
          if ($LASTEXITCODE -ne 0) { throw 'Windows installer did not prepare Python download dependencies' }

          python tests/build_synthetic_gguf.py --out (Join-Path $app 'models/install-smoke.gguf') --arch llama --name Windows-Install-Smoke --layers 2 --hkv 1 --kl 16 --vl 16 --embd 64 --ff 128 --ctx-train 2048
          $stdout = Join-Path $tmp 'serve.stdout.log'
          $stderr = Join-Path $tmp 'serve.stderr.log'
          $env:LLM_COMMUNITY_TUNES = 'off'
          $proc = Start-Process -FilePath (Join-Path $app '.bin/ggrun.exe') -ArgumentList @((Join-Path $app 'models/install-smoke.gguf'), '--cpu', '--host', '127.0.0.1', '--port', '19132') -RedirectStandardOutput $stdout -RedirectStandardError $stderr -PassThru
          try {
            $ready = $false
            for ($i = 0; $i -lt 60; $i++) {
              try {
                $health = Invoke-RestMethod -Uri 'http://127.0.0.1:19132/health' -TimeoutSec 1
                if ($health.status -eq 'ok') { $ready = $true; break }
              } catch { Start-Sleep -Milliseconds 500 }
            }
            if (!$ready) {
              Get-Content $stdout -ErrorAction SilentlyContinue
              Get-Content $stderr -ErrorAction SilentlyContinue
              throw 'Installed Windows ggrun did not serve a model through its packaged backend'
            }
          } finally {
            if (!$proc.HasExited) { & taskkill /PID $proc.Id /T /F | Out-Null }
          }

  release-install-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache: false
      - name: Install from local release bundle outside repo
        run: |
          tmp="$(mktemp -d)"
          go build -C go -trimpath -o ggrun ./cmd/ggrun
          go build -o "$tmp/llama-server" ./tests/fake_llama_server.go
          scripts/package-release.sh ggrun-linux-x86_64-cpu.tar.gz "$tmp/llama-server" "$tmp/release"
          (cd "$tmp/release" && sha256sum ggrun-linux-x86_64-cpu.tar.gz > SHA256SUMS)
          LLM_APP_HOME="$tmp/app" \
            LLM_SETUP_MODE=release \
            LLM_SETUP_BACKEND=cpu \
            LLM_INSTALL_RELEASE_DIR="$tmp/release" \
            LLM_SETUP_PY_DEPS=skip \
            LLM_SETUP_NONINTERACTIVE=1 \
            ./setup-linux.sh
          test -x "$tmp/app/ggrun"
          test -x "$tmp/app/.bin/llama-server"
          python3 tests/build_synthetic_gguf.py --out "$tmp/app/models/install-smoke.gguf" \
            --arch llama --name Linux-Install-Smoke --layers 2 --hkv 1 --kl 16 --vl 16 \
            --embd 64 --ff 128 --ctx-train 2048
          LLM_COMMUNITY_TUNES=off "$tmp/app/ggrun" "$tmp/app/models/install-smoke.gguf" \
            --cpu --host 127.0.0.1 --port 19131 >"$tmp/serve.log" 2>&1 &
          server_pid=$!
          trap 'kill -TERM "$server_pid" 2>/dev/null || true' EXIT
          ready=0
          for _ in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:19131/health | grep -q '"status":"ok"'; then
              ready=1
              break
            fi
            sleep 0.5
          done
          if [ "$ready" -ne 1 ]; then
            cat "$tmp/serve.log"
            exit 1
          fi
          kill -TERM "$server_pid"
          wait "$server_pid" || true
          trap - EXIT

  release-install-macos-smoke:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache: false
      - name: Install macOS app home and serve through packaged backend
        run: |
          tmp="$(mktemp -d)"
          go build -C go -trimpath -o ggrun ./cmd/ggrun
          go build -o "$tmp/llama-server" ./tests/fake_llama_server.go
          scripts/package-release.sh ggrun-macos-arm64-metal.tar.gz "$tmp/llama-server" "$tmp/release"
          (cd "$tmp/release" && shasum -a 256 ggrun-macos-arm64-metal.tar.gz > SHA256SUMS)
          LLM_APP_HOME="$tmp/app" \
            LLM_SETUP_MODE=release \
            LLM_SETUP_BACKEND=metal \
            LLM_INSTALL_RELEASE_DIR="$tmp/release" \
            LLM_SETUP_PY_DEPS=skip \
            LLM_SETUP_NONINTERACTIVE=1 \
            ./setup-mac.sh
          python3 tests/build_synthetic_gguf.py --out "$tmp/app/models/install-smoke.gguf" \
            --arch llama --name macOS-Install-Smoke --layers 2 --hkv 1 --kl 16 --vl 16 \
            --embd 64 --ff 128 --ctx-train 2048
          LLM_COMMUNITY_TUNES=off "$tmp/app/ggrun" "$tmp/app/models/install-smoke.gguf" \
            --cpu --host 127.0.0.1 --port 19133 >"$tmp/serve.log" 2>&1 &
          server_pid=$!
          trap 'kill -TERM "$server_pid" 2>/dev/null || true' EXIT
          ready=0
          for _ in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:19133/health | grep -q '"status":"ok"'; then
              ready=1
              break
            fi
            sleep 0.5
          done
          if [ "$ready" -ne 1 ]; then
            cat "$tmp/serve.log"
            exit 1
          fi
          kill -TERM "$server_pid"
          wait "$server_pid" || true
          trap - EXIT

  windows-release-install:
    # Exercises the REAL install path (download from the published GitHub
    # release, verify SHA256SUMS, extract, configure, launch the bundled
    # backend) on a clean Windows runner. The package-windows-smoke job only
    # tests a locally-built zip, so this is the only job that catches general
    # breakage in the remote download / backend-launch flow (e.g. issue #18).
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - name: Parse-check install.ps1 (pwsh 7 + Windows PowerShell 5.1)
        shell: pwsh
        run: |
          $errs = $null
          [void][System.Management.Automation.Language.Parser]::ParseFile("install.ps1", [ref]$null, [ref]$errs)
          if ($errs.Count) { Write-Error "install.ps1 fails to parse under pwsh 7: $($errs[0].Message)"; exit 1 }
          # The documented install command is `powershell` (5.1); guard against
          # regressions that only surface under Windows PowerShell 5.1.
          powershell -NoProfile -Command '$e=$null; [void][System.Management.Automation.Language.Parser]::ParseFile("install.ps1",[ref]$null,[ref]$e); if($e.Count){Write-Error ("5.1 parse error at line "+$e[0].Extent.StartLineNumber+": "+$e[0].Message); exit 1}'
      - name: Install ggrun from published release (documented powershell 5.1 command)
        shell: cmd
        run: powershell -ExecutionPolicy Bypass -File install.ps1 -Backend cpu -NoPath -AssumeYes
      - name: Smoke test installed ggrun
        shell: pwsh
        run: |
          $env:LLM_APP_HOME = "$env:USERPROFILE\ggrun"
          & "$env:USERPROFILE\ggrun\.bin\ggrun.exe" version
          & "$env:USERPROFILE\ggrun\.bin\llama-server.exe" --version
