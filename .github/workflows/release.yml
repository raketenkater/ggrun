name: Release

# Supported targets: Linux, macOS, and Windows via WSL2. Native Windows assets
# are intentionally not produced. CUDA/ik_llama.cpp bundles need a CUDA-capable
# release host; see docs/releasing.md for the manual asset path.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  preflight:
    name: preflight tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python test dependencies
        run: python3 -m pip install pytest huggingface_hub

      - name: Check Go formatting
        working-directory: go
        run: test -z "$(gofmt -l .)"

      - name: Run Go package tests
        working-directory: go
        run: go test ./...

      - name: Vet Go packages
        working-directory: go
        run: go vet ./...

      - name: Run shell and Python regression tests
        run: |
          python3 tests/test_parse_gguf.py
          bash tests/test_estimator.sh
          bash tests/test_safety.sh
          bash tests/test_setup_home.sh
          bash tests/test_model_index.sh
          bash tests/test_moe_placement.sh
          python3 -m pytest tests/test_downloader_quant.py tests/test_update_recommendations.py

  package:
    name: package ${{ matrix.asset }}
    needs: preflight
    runs-on: ${{ matrix.os }}
    env:
      LLAMA_CPP_REF: d2462f8f7ac6d80070a587ffebf6cd73730f4280

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: llm-server-linux-x86_64-cpu.tar.gz
            cmake_flags: -DGGML_NATIVE=OFF
          - os: ubuntu-latest
            asset: llm-server-linux-x86_64-vulkan.tar.gz
            cmake_flags: -DGGML_VULKAN=ON -DGGML_NATIVE=OFF
          - os: macos-14
            asset: llm-server-macos-arm64-metal.tar.gz
            cmake_flags: -DGGML_METAL=ON -DGGML_NATIVE=OFF

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod

      - name: Install build tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential libvulkan-dev glslc glslang-tools spirv-headers vulkan-tools

      - name: Clone pinned llama.cpp
        run: |
          git init /tmp/llama.cpp
          git -C /tmp/llama.cpp remote add origin https://github.com/ggml-org/llama.cpp.git
          git -C /tmp/llama.cpp fetch --depth=1 origin "$LLAMA_CPP_REF"
          git -C /tmp/llama.cpp checkout --detach FETCH_HEAD

      - name: Build llama-server
        run: |
          cmake -S /tmp/llama.cpp -B /tmp/llama.cpp/build -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake_flags }}
          cmake --build /tmp/llama.cpp/build --config Release -j 3 -t llama-server

      - name: Smoke-test backend binary
        run: /tmp/llama.cpp/build/bin/llama-server --version

      - name: Build Go llm-server
        working-directory: go
        run: |
          version="${GITHUB_REF_NAME}"
          case "$version" in
            v*) ;;
            *) version="" ;;  # non-tag builds keep the in-source default
          esac
          ldflags="-s -w"
          if [ -n "$version" ]; then
            ldflags="$ldflags -X github.com/raketenkater/llm-server/pkg/update.currentVersion=$version"
          fi
          go build -trimpath -ldflags="$ldflags" -o llm-server ./cmd/llm-server

      - name: Package
        run: scripts/package-release.sh "${{ matrix.asset }}" /tmp/llama.cpp/build/bin/llama-server dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}

  publish:
    name: publish release assets
    if: startsWith(github.ref, 'refs/tags/')
    needs: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz > SHA256SUMS

      - name: Attach assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
