name: Release

# Release bundles cover Linux CPU/Vulkan/CUDA, macOS Metal, and Windows CPU.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  preflight:
    name: preflight tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python test dependencies
        run: python3 -m pip install pytest huggingface_hub

      - name: Check Go formatting
        working-directory: go
        run: test -z "$(gofmt -l .)"

      - name: Run Go package tests
        working-directory: go
        run: go test ./...

      - name: Vet Go packages
        working-directory: go
        run: go vet ./...

      - name: Run shell and Python regression tests
        run: |
          python3 tests/test_parse_gguf.py
          bash tests/test_estimator.sh
          bash tests/test_safety.sh
          bash tests/test_setup_home.sh
          bash tests/test_model_index.sh
          bash tests/test_moe_placement.sh
          python3 -m pytest tests/test_downloader_quant.py tests/test_update_recommendations.py

  package:
    name: package ${{ matrix.asset }}
    needs: preflight
    runs-on: ${{ matrix.os }}
    env:
      LLAMA_CPP_REF: d2462f8f7ac6d80070a587ffebf6cd73730f4280

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: ggrun-linux-x86_64-cpu.tar.gz
            cmake_flags: -DGGML_NATIVE=OFF
          - os: ubuntu-latest
            asset: ggrun-linux-x86_64-vulkan.tar.gz
            cmake_flags: -DGGML_VULKAN=ON -DGGML_NATIVE=OFF
          - os: macos-14
            asset: ggrun-macos-arm64-metal.tar.gz
            cmake_flags: -DGGML_METAL=ON -DGGML_NATIVE=OFF

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache: false

      - name: Install build tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential libvulkan-dev glslc glslang-tools spirv-headers vulkan-tools

      - name: Clone pinned llama.cpp
        run: |
          git init /tmp/llama.cpp
          git -C /tmp/llama.cpp remote add origin https://github.com/ggml-org/llama.cpp.git
          git -C /tmp/llama.cpp fetch --depth=1 origin "$LLAMA_CPP_REF"
          git -C /tmp/llama.cpp checkout --detach FETCH_HEAD

      - name: Build llama-server
        run: |
          cmake -S /tmp/llama.cpp -B /tmp/llama.cpp/build -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake_flags }}
          cmake --build /tmp/llama.cpp/build --config Release -j 3 -t llama-server

      - name: Smoke-test backend binary
        run: /tmp/llama.cpp/build/bin/llama-server --version

      - name: Smoke-test real model serving
        shell: bash
        run: |
          model="$RUNNER_TEMP/stories15M-q4_0.gguf"
          url="https://huggingface.co/ggml-org/tiny-llamas/resolve/6e091d820cbe8f22eeb604d136403eca290b8c1e/stories15M-q4_0.gguf?download=true"
          curl -fL --retry 3 "$url" -o "$model"
          if command -v sha256sum >/dev/null 2>&1; then
            echo "6151b1929d7f5aa3385d9ddef3393e55587c0a55de661562322bc51dfda93a04  $model" | sha256sum -c -
          else
            echo "6151b1929d7f5aa3385d9ddef3393e55587c0a55de661562322bc51dfda93a04  $model" | shasum -a 256 -c -
          fi
          /tmp/llama.cpp/build/bin/llama-server -m "$model" --host 127.0.0.1 --port 19141 >"$RUNNER_TEMP/llama-serve.log" 2>&1 &
          server_pid=$!
          trap 'kill -TERM "$server_pid" 2>/dev/null || true' EXIT
          ready=0
          for _ in $(seq 1 120); do
            if curl -fsS http://127.0.0.1:19141/health >/dev/null; then
              ready=1
              break
            fi
            sleep 0.5
          done
          if [ "$ready" -ne 1 ]; then
            cat "$RUNNER_TEMP/llama-serve.log"
            exit 1
          fi
          curl -fsS http://127.0.0.1:19141/v1/models >/dev/null
          kill -TERM "$server_pid"
          wait "$server_pid"
          trap - EXIT

      - name: Build Go ggrun
        working-directory: go
        run: |
          version="${GITHUB_REF_NAME}"
          case "$version" in
            v*) ;;
            *) version="" ;;  # non-tag builds keep the in-source default
          esac
          ldflags="-s -w"
          if [ -n "$version" ]; then
            ldflags="$ldflags -X github.com/raketenkater/ggrun/pkg/update.currentVersion=$version"
          fi
          go build -trimpath -ldflags="$ldflags" -o ggrun ./cmd/ggrun

      - name: Package
        run: scripts/package-release.sh "${{ matrix.asset }}" /tmp/llama.cpp/build/bin/llama-server dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}

  package-windows:
    name: package ggrun-windows-x86_64-cpu.zip
    needs: preflight
    runs-on: windows-latest
    env:
      LLAMA_CPP_REF: d2462f8f7ac6d80070a587ffebf6cd73730f4280
      ASSET: ggrun-windows-x86_64-cpu.zip

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache: false

      - name: Clone pinned llama.cpp
        shell: pwsh
        run: |
          $src = Join-Path $env:RUNNER_TEMP 'llama.cpp'
          git init $src
          git -C $src remote add origin https://github.com/ggml-org/llama.cpp.git
          git -C $src fetch --depth=1 origin $env:LLAMA_CPP_REF
          git -C $src checkout --detach FETCH_HEAD
          "LLAMA_CPP_DIR=$src" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build llama-server
        shell: pwsh
        run: |
          $build = Join-Path $env:LLAMA_CPP_DIR 'build'
          cmake -S $env:LLAMA_CPP_DIR -B $build -DCMAKE_BUILD_TYPE=Release -DGGML_NATIVE=OFF
          cmake --build $build --config Release --parallel 3 --target llama-server
          $server = Get-ChildItem -Path $build -Filter llama-server.exe -Recurse | Select-Object -First 1
          if (!$server) { throw 'llama-server.exe not found after build' }
          & $server.FullName --version
          "LLAMA_SERVER_PATH=$($server.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Smoke-test real model serving
        shell: pwsh
        run: |
          $model = Join-Path $env:RUNNER_TEMP 'stories15M-q4_0.gguf'
          $url = 'https://huggingface.co/ggml-org/tiny-llamas/resolve/6e091d820cbe8f22eeb604d136403eca290b8c1e/stories15M-q4_0.gguf?download=true'
          Invoke-WebRequest -Uri $url -OutFile $model
          $actual = (Get-FileHash -Algorithm SHA256 $model).Hash.ToLowerInvariant()
          if ($actual -ne '6151b1929d7f5aa3385d9ddef3393e55587c0a55de661562322bc51dfda93a04') { throw 'Tiny GGUF checksum mismatch' }
          $stdout = Join-Path $env:RUNNER_TEMP 'llama-serve.stdout.log'
          $stderr = Join-Path $env:RUNNER_TEMP 'llama-serve.stderr.log'
          $proc = Start-Process -FilePath $env:LLAMA_SERVER_PATH -ArgumentList @('-m', $model, '--host', '127.0.0.1', '--port', '19142') -RedirectStandardOutput $stdout -RedirectStandardError $stderr -PassThru
          try {
            $ready = $false
            for ($i = 0; $i -lt 120; $i++) {
              try {
                Invoke-RestMethod -Uri 'http://127.0.0.1:19142/health' -TimeoutSec 1 | Out-Null
                $ready = $true
                break
              } catch { Start-Sleep -Milliseconds 500 }
            }
            if (!$ready) {
              Get-Content $stdout -ErrorAction SilentlyContinue
              Get-Content $stderr -ErrorAction SilentlyContinue
              throw 'Windows llama-server did not load and serve the smoke model'
            }
            Invoke-RestMethod -Uri 'http://127.0.0.1:19142/v1/models' -TimeoutSec 5 | Out-Null
          } finally {
            if (!$proc.HasExited) { & taskkill /PID $proc.Id /T /F | Out-Null }
          }

      - name: Build Go ggrun
        working-directory: go
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME
          $ldflags = '-s -w'
          if ($version -like 'v*') {
            $ldflags = "$ldflags -X github.com/raketenkater/ggrun/pkg/update.currentVersion=$version"
          }
          go build -trimpath -ldflags $ldflags -o ggrun.exe ./cmd/ggrun

      - name: Package
        shell: pwsh
        run: scripts/package-release.ps1 -AssetName $env:ASSET -ServerBin $env:LLAMA_SERVER_PATH -OutDir dist -LlmServerBin go/ggrun.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET }}
          path: dist/${{ env.ASSET }}

  package-cuda:
    name: package ggrun-linux-x86_64-cuda.tar.gz
    needs: preflight
    runs-on: ubuntu-latest
    container: nvidia/cuda:12.8.1-devel-ubuntu22.04
    env:
      IK_LLAMA_REF: 1fddd12ba861c4815a8633f14d9c5670692099cc
      ASSET: ggrun-linux-x86_64-cuda.tar.gz

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache: false

      - name: Install CUDA build dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            build-essential ca-certificates cmake curl git libcurl4-openssl-dev libgomp1

      - name: Build pinned ik_llama CUDA bundle
        run: OUT_DIR=dist scripts/build-linux-cuda-bundle.sh

      - name: Smoke-test backend binary
        run: tar -xzf dist/${{ env.ASSET }} -C /tmp && /tmp/ggrun-linux-x86_64-cuda/bin/llama-server --version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET }}
          path: dist/${{ env.ASSET }}

  publish:
    name: publish release assets
    if: startsWith(github.ref, 'refs/tags/')
    needs: [package, package-windows, package-cuda]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          find . -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.zip' \) -printf '%f\0' | sort -z | xargs -0 sha256sum > SHA256SUMS

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign release checksums
        run: cosign sign-blob --yes --bundle dist/SHA256SUMS.bundle dist/SHA256SUMS

      - name: Attach assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS
            dist/SHA256SUMS.bundle
